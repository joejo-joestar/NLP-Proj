name: nlp-rag
channels:
  - defaults
dependencies:
  - python=3.12
  - numpy
  - scipy
  - pandas
  - peft>=0.11.0
  - scikit-learn>=1.5.0
  - tqdm>=4.66.0
  - huggingface_hub>=0.23.0
  - transformers>=4.41.0
  - matplotlib
  - seaborn
  - ipykernel
  - ipywidgets
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - torch
      - torchvision

# just run `conda env create` on this dir, and it'll pickup `environment.yml` file.
